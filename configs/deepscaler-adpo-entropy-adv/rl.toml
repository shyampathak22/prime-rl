# DeepScaleR ADPO + Entropy-Advantage
#
# ADPO baseline with KL-weighted advantage amplification:
# adjusted_adv = adv + scale * adv * mean_kl_per_sample

inference_gpu_ids = [0,1,2,3,4,5]
trainer_gpu_ids = [6,7]

max_steps = 500
seq_len = 8192

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[wandb]
project = "adpo-ablations"
name = "adpo-entropy-adv"

[ckpt]
interval = 50

[orchestrator]
batch_size = 512
rollouts_per_example = 16

[orchestrator.sampling]
temperature = 0.6
max_tokens = 8192

[[orchestrator.env]]
id = "deepscaler-multireward"
name = "deepscaler"
args = { length_threshold_tokens = 4000, gated_length_reward = false, math_verify_max_workers = 128, math_verify_timeout = 60 }
reward_keys = ["correct_answer", "length_reward"]
reward_weights = [1.0, 1.0]

[orchestrator.env.adaptive_weights]
enabled = true
ema_alpha = 0.1
saturation_threshold = 0.95
decay_exponent = 2.0
min_weights = [0.1, 0.1]
recovery_rate = 0.01

[orchestrator.advantage]
batch_normalize = true
std_eps = 1e-8

[trainer.loss]
entropy_adv_scale = 1.0

[trainer.model.ac]

[inference.parallel]
dp = 6
